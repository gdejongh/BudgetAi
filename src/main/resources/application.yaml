spring:
  application:
    name: budgetai
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-at-least-32-bytes-long}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

plaid:
  client-id: ${PLAID_CLIENT_ID:}
  secret: ${PLAID_SECRET:}
  env: ${PLAID_ENV:sandbox}
  encryption-key: ${PLAID_ENCRYPTION_KEY:dev-encryption-key-change-in-prod-32b}
  sync:
    cron: ${PLAID_SYNC_CRON:0 35 19 * * *}
